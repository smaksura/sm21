<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
<style>
body {
  background: #0f0f0f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 50%;
  font-family: Arial;
  padding: 6%;
}
.calculator {
  width: 300px;
  background: #1c1c1c;
  border-radius: 20px;
  padding: 15px;
}
.display {
  color: white;
  font-size: 40px;
  text-align: right;
  padding: 20px;

}
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
button {
  height: 60px;
  border: none;
  border-radius: 15px;
  background: #2a2a2a;
  color: white;
  font-size: 20px;
}
.op { color: #4da6ff; }
.equal { background: #4da6ff; }

</style>
</head>
<body>

<div class="calculator">
  <div class="display" id="display">0</div>
  <div class="buttons">
    <button onclick="clearDisplay()">C</button>
    <button onclick="del()">⌫</button>
    <button onclick="press('%')">%</button>
    <button class="op" onclick="press('/')">÷</button>

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="op" onclick="press('*')">×</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="op" onclick="press('-')">−</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="op" onclick="press('+')">+</button>

    <button class="zero" onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button class="equal" onclick="calc()">=</button>
  </div>
</div>

<script>
let input = "";

function press(val){
  input = input === "0" ? val : input + val;
  document.getElementById("display").innerText = input;
}
function clearDisplay(){
  input = "";
  document.getElementById("display").innerText = "0";
}
function del(){
  input = input.slice(0,-1);
  document.getElementById("display").innerText = input || "0";
}
function calc(){
  try{
    input = Function("return " + input)();
    document.getElementById("display").innerText = input;
  }catch{
    document.getElementById("display").innerText = "Error";
    input = "";
  }
}
</script>
</body>
</body>
</html>
